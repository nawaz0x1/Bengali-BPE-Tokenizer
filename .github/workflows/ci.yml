name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src/bpe --cov-report=term-missing

      - name: Check formatting (black)
        run: black --check src/ tests/

      - name: Lint (ruff)
        run: ruff check src/ tests/

  smoke-test:
    name: End-to-end smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install tqdm

      - name: Train model
        run: |
          python bpe.py train \
            --file examples/corpus.txt \
            --vocab-size 500 \
            --output output/ \
            --min-freq 1 \
            --no-progress

      - name: Encode text
        run: |
          python bpe.py encode \
            --model output/ \
            --text "বাংলাদেশ"

      - name: Stats
        run: |
          python bpe.py stats --model output/

      - name: Inspect word
        run: |
          python bpe.py inspect --model output/ --word বাংলা
